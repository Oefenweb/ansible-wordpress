# pre test file
---
- name: percona server | add repo | dependencies
  ansible.builtin.apt:
    name:
      - software-properties-common
      - dirmngr
    update_cache: true
    cache_valid_time: "{{ apt_update_cache_valid_time | default(3600) }}"

- name: percona server | percona-release
  ansible.builtin.apt:
    deb: "https://repo.percona.com/apt/percona-release_latest.{{ ansible_distribution_release }}_all.deb"

- name: percona server | add repo
  ansible.builtin.shell: >
    percona-release enable-only ps-80
  changed_when: true

- name: php | add repo
  ansible.builtin.apt_repository:
    repo: 'ppa:ondrej/php'
    update_cache: true
    mode: '0644'

- name: percona server | preseed
  ansible.builtin.debconf:
    name: "{{ item.name }}"
    question: "{{ item.question }}"
    value: "{{ item.value }}"
    vtype: "{{ item.vtype }}"
  with_items:
    - name: 'percona-server-server'
      question: 'percona-server-server/root-pass'
      value: "{{ wordpress_percona_server_root_password }}"
      vtype: password
    - name: 'percona-server-server'
      question: 'percona-server-server/re-root-pass'
      value: "{{ wordpress_percona_server_root_password }}"
      vtype: password
    - name: 'percona-server-server'
      question: 'percona-server-server/default-auth-override'
      value: 'Use Legacy Authentication Method (Retain MySQL 5.x Compatibility)'
      vtype: select
  changed_when: false

- name: percona server | install
  ansible.builtin.apt:
    name:
      - percona-server-client
      - percona-server-server
      - libperconaserverclient21
      - "python{{ ansible_python_version is version('3', '>=') | ternary('3', '') }}-mysqldb"
    state: "{{ apt_install_state | default('latest') }}"

- name: php | install
  ansible.builtin.apt:
    name:
      - apache2
      - libapache2-mod-php8.3
      - php8.3-cli
      - php8.3-gd
      - php8.3-gmp
      - php8.3-ldap
      - php8.3-mbstring
      - php8.3-mysql
      - php8.3-opcache
      - php8.3-snmp
      - php8.3-xml
    state: "{{ apt_install_state | default('latest') }}"

- name: percona server | start
  ansible.builtin.service:
    name: mysql
    state: started

- name: percona server | configure
  ansible.builtin.copy:
    dest: '~root/.my.cnf'
    content: |
      [client]
      host = localhost
      port = 3306
      user = root
      password = '{{ wordpress_percona_server_root_password }}'
    owner: root
    group: root
    mode: '0600'

- name: percona server | ensure database
  community.mysql.mysql_db:
    name: wordpress
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci

- name: percona server | ensure grants
  community.mysql.mysql_user:
    name: wordpress
    password: 'heCrE7*d2KEs'
    priv: 'wordpress.*:ALL'

- name: apache server | start
  ansible.builtin.service:
    name: apache2
    state: started
